<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ulcamp — turntable</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #stage {
    width: min(70vw, 70vh);
    height: min(70vw, 70vh);
    position: relative;
  }
  #stage img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 0.08s linear;
  }
  #stage img.active {
    opacity: 1;
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <script>
    const frames = [
      "front", "right1", "right2", "right3", "right4",
      "back", "left4", "left3", "left2", "left1"
    ];

    const stage = document.getElementById("stage");
    const imgs = frames.map((name) => {
      const img = document.createElement("img");
      img.src = `img/${name}.png`;
      stage.appendChild(img);
      return img;
    });
    imgs[0].classList.add("active");

    let i = 0;
    const FRAME_MS = 90;
    setInterval(() => {
      imgs[i].classList.remove("active");
      i = (i + 1) % imgs.length;
      imgs[i].classList.add("active");
    }, FRAME_MS);
  </script>
</body>
</html>
